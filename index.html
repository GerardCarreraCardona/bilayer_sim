<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bilayer Triangular Wave Simulation</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#111111;color:#ccc;font-family:monospace;font-size:13px;height:100%}
#wrap{padding:20px 24px 24px;display:flex;flex-direction:column;height:100%}
h2{color:#666;font-size:12px;font-weight:400;letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px}
#main{display:flex;gap:20px;flex:1;min-height:0}
#chart-col{display:flex;flex-direction:column;flex:1;min-width:0}
#chart-wrap{position:relative;flex:1;min-height:0}
#ctrl-col{display:flex;flex-direction:column;gap:14px;width:160px;flex-shrink:0;padding-top:2px}
.sl{display:flex;flex-direction:column;gap:4px}
.sl label{color:#666;font-size:10px;line-height:1.3}
.sl .val{color:#ccc;font-size:11px;font-weight:500}
input[type=range]{width:100%;accent-color:#4a9eff;height:16px;cursor:pointer}
.legend{display:flex;gap:10px;margin-bottom:10px;font-size:11px}
button.tog{background:none;border:1px solid #333;border-radius:4px;color:#888;cursor:pointer;display:flex;align-items:center;gap:5px;padding:4px 10px;font-family:monospace;font-size:11px;transition:opacity .15s,border-color .15s}
button.tog.on{color:#ccc;border-color:#555}
button.tog.off{opacity:.35;border-color:#2a2a2a}
.legend i{display:inline-block;width:20px;height:2px}
.lb{background:#4a9eff}
.lr{background:#ff4a4a}
.divider{border:none;border-top:1px solid #1e1e1e;margin:2px 0}
</style>
</head>
<body>
<div id="wrap">
  <h2>bilayer triangular wave — RC circuit simulation</h2>
  <div id="main">
    <div id="chart-col">
      <div class="legend">
        <button class="tog on" id="tog-I" onclick="toggleTrace(0,'tog-I')"><i class="lb"></i>current I (pA)</button>
        <button class="tog on" id="tog-V" onclick="toggleTrace(1,'tog-V')"><i class="lr"></i>voltage V (mV)</button>
      </div>
      <div id="chart-wrap">
        <canvas id="chart" role="img" aria-label="Bilayer simulation dual-axis chart"></canvas>
      </div>
    </div>
    <div id="ctrl-col">
      <div class="sl">
        <label>R<sub>a</sub> — access resistance</label>
        <input type="range" id="ra" min="0" max="100" step="1" value="25">
        <span class="val" id="ra-val">10 kΩ</span>
      </div>
      <hr class="divider">
      <div class="sl">
        <label>R<sub>m</sub> — membrane resistance</label>
        <input type="range" id="rm" min="0" max="100" step="1" value="75">
        <span class="val" id="rm-val">10 GΩ</span>
      </div>
      <hr class="divider">
      <div class="sl">
        <label>C<sub>m</sub> — membrane capacitance</label>
        <input type="range" id="cm" min="0" max="100" step="1" value="25">
        <span class="val" id="cm-val">100 pF</span>
      </div>
      <hr class="divider">
      <div class="sl">
        <label>σ<sub>noise</sub> — current noise (RMS)</label>
        <input type="range" id="noise" min="0" max="100" step="1" value="20">
        <span class="val" id="noise-val">1.00 pA</span>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
/* ---------- parameter helpers ---------- */
const logLerp = (a, b, t) => Math.pow(10, Math.log10(a) + (Math.log10(b) - Math.log10(a)) * t / 100);
const fmtR = v => {
  if (v >= 1e9) return (v / 1e9).toPrecision(3) + ' GΩ';
  if (v >= 1e6) return (v / 1e6).toPrecision(3) + ' MΩ';
  return (v / 1e3).toPrecision(3) + ' kΩ';
};
const fmtC = v => (v * 1e12).toPrecision(3) + ' pF';
const fmtNoise = v => v < 1e-12 ? '0 pA' : (v * 1e12).toPrecision(3) + ' pA';

function getParams() {
  return {
    Ra:    logLerp(1e4,   1e10, +document.getElementById('ra').value),
    Rm:    logLerp(1e4,   1e11, +document.getElementById('rm').value),
    Cm:    logLerp(10e-12, 1e-8, +document.getElementById('cm').value),
    sigma: logLerp(0.01e-12, 1000e-12, +document.getElementById('noise').value)
  };
}

/* ---------- Box-Muller gaussian noise ---------- */
function gaussNoise(n, sigma) {
  const out = new Float64Array(n);
  for (let i = 0; i < n; i += 2) {
    const u = 1 - Math.random(), v = Math.random();
    const r = Math.sqrt(-2 * Math.log(u));
    out[i]     = r * Math.cos(2 * Math.PI * v) * sigma;
    if (i + 1 < n) out[i + 1] = r * Math.sin(2 * Math.PI * v) * sigma;
  }
  return out;
}

/* ---------- stimulus ---------- */
const AMP = 30e-3, PERIOD = 120e-3, DELAY = 0.016, MAX_P = 2.75;
const T_END = 0.4, N = 800;
const tArr = Array.from({ length: N }, (_, i) => T_END * i / (N - 1));

function stimulus(t) {
  if (t <= DELAY || t >= MAX_P * PERIOD + DELAY) return 0;
  const tm = t - PERIOD * 0.75 - DELAY;
  return 4 * AMP / PERIOD * Math.abs(((tm % PERIOD) + PERIOD) % PERIOD - PERIOD / 2) - AMP;
}

/* ---------- ODE solver (Crank-Nicolson) ----------
   R_a C dI/dt + (R_a+R_m)/R_m * I = C dV/dt + V/R_m
   tau = R_a * C
   k   = (R_a + R_m) / R_m
   rhs(t) = C * dV/dt + V(t)/R_m
   Crank-Nicolson: (1 + k*dt/(2*tau))*I[n+1] = (1 - k*dt/(2*tau))*I[n] + dt/(2*tau)*(rhs[n]+rhs[n+1])
*/
function simulate() {
  const { Ra, Rm, Cm, sigma } = getParams();
  const dt = tArr[1] - tArr[0];
  const V = tArr.map(stimulus);

  const tau = Ra * Cm;
  const k   = (Ra + Rm) / Rm;

  // precompute dV/dt by central differences
  const dvdt = new Float64Array(N);
  for (let i = 1; i < N - 1; i++) dvdt[i] = (V[i+1] - V[i-1]) / (2 * dt);
  dvdt[0]     = (V[1]   - V[0])   / dt;
  dvdt[N - 1] = (V[N-1] - V[N-2]) / dt;

  const rhs = tArr.map((t, i) => Cm * dvdt[i] + V[i] / Rm);

  const I = new Float64Array(N);
  const alpha = dt / tau;
  const a = 1 + k * alpha / 2;
  const b = 1 - k * alpha / 2;
  for (let i = 0; i < N - 1; i++) {
    I[i + 1] = (b * I[i] + alpha / 2 * (rhs[i] + rhs[i + 1])) / a;
  }
  const noise = gaussNoise(N, sigma);
  for (let i = 0; i < N; i++) I[i] += noise[i];
  return { V, I };
}

/* ---------- chart ---------- */
const ctx = document.getElementById('chart').getContext('2d');
let { V, I } = simulate();

const labelsMs = tArr.map(t => (t * 1000).toFixed(1));

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: labelsMs,
    datasets: [
      {
        label: 'I (pA)',
        data: Array.from(I).map(v => v * 1e12),
        borderColor: '#4a9eff',
        borderWidth: 1.5,
        pointRadius: 0,
        yAxisID: 'y',
        tension: 0
      },
      {
        label: 'V (mV)',
        data: Array.from(V).map(v => v * 1e3),
        borderColor: '#ff4a4a',
        borderWidth: 1.5,
        pointRadius: 0,
        yAxisID: 'y2',
        tension: 0
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    plugins: { legend: { display: false } },
    scales: {
      x: {
        type: 'category',
        ticks: {
          maxTicksLimit: 9,
          autoSkip: true,
          color: '#555',
          font: { size: 10 },
          callback(v, i) { return labelsMs[i]; }
        },
        grid: { color: '#1c1c1c' },
        border: { color: '#2a2a2a' },
        title: { display: true, text: 'time (ms)', color: '#555', font: { size: 10 } }
      },
      y: {
        position: 'left',
        ticks: { color: '#4a9eff', font: { size: 10 }, callback: v => v.toFixed(1) + ' pA' },
        grid: { color: '#1c1c1c' },
        border: { color: '#2a2a2a' },
        title: { display: true, text: 'current (pA)', color: '#4a9eff', font: { size: 10 } }
      },
      y2: {
        position: 'right',
        ticks: { color: '#ff4a4a', font: { size: 10 }, callback: v => v.toFixed(0) + ' mV' },
        grid: { drawOnChartArea: false },
        border: { color: '#2a2a2a' },
        title: { display: true, text: 'voltage (mV)', color: '#ff4a4a', font: { size: 10 } }
      }
    }
  }
});

/* ---------- percentile clip ----------
   Sort a copy, pick p-th and (1-p)-th percentile values,
   then pad by 10% so the line doesn't sit on the axis edge.
*/
function robustRange(arr, p = 0.01) {
  const s = [...arr].filter(isFinite).sort((a, b) => a - b);
  if (!s.length) return { min: -1, max: 1 };
  const lo = s[Math.floor(p * s.length)];
  const hi = s[Math.min(Math.ceil((1 - p) * s.length), s.length - 1)];
  const pad = (hi - lo) * 0.12 || Math.abs(hi) * 0.12 || 1;
  const ext = Math.max(Math.abs(lo - pad), Math.abs(hi + pad));
  return { min: -ext, max: ext };
}

/* ---------- UI updates ---------- */
function updateLabels() {
  const { Ra, Rm, Cm, sigma } = getParams();
  document.getElementById('ra-val').textContent    = fmtR(Ra);
  document.getElementById('rm-val').textContent    = fmtR(Rm);
  document.getElementById('cm-val').textContent    = fmtC(Cm);
  document.getElementById('noise-val').textContent = fmtNoise(sigma);
}

function refresh() {
  updateLabels();
  const { V, I } = simulate();
  const IpA = Array.from(I).map(v => v * 1e12);
  const VmV = Array.from(V).map(v => v * 1e3);
  chart.data.datasets[0].data = IpA;
  chart.data.datasets[1].data = VmV;
  const rI = robustRange(IpA);
  const rV = robustRange(VmV);
  chart.options.scales.y.min  = rI.min;
  chart.options.scales.y.max  = rI.max;
  chart.options.scales.y2.min = rV.min;
  chart.options.scales.y2.max = rV.max;
  chart.update('none');
}

/* ---------- toggle traces ---------- */
function toggleTrace(idx, btnId) {
  const ds = chart.data.datasets[idx];
  const btn = document.getElementById(btnId);
  const visible = ds.hidden;
  ds.hidden = !visible;
  btn.classList.toggle('on',  visible);
  btn.classList.toggle('off', !visible);
  chart.update('none');
}

['ra', 'rm', 'cm', 'noise'].forEach(id => document.getElementById(id).addEventListener('input', refresh));
updateLabels();
refresh();
</script>
</body>
</html>
